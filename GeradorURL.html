<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Atalhos .URL - Windows</title>
    <!-- Ícone da página (favicon) personalizado -->
    <link rel="icon" type="image/png" href="https://cdn.discordapp.com/attachments/1187603598759166036/1520900063600050428/geradorurl.png?ex=6a42e010&is=6a418e90&hm=854caa255ae48a0ca6380e33fea5256173d05a2189510e40d7d929dc45c1c3be">
    <style>
        :root {
            --bg-start: #0f0c29;
            --bg-mid: #1a1a3e;
            --bg-end: #24243e;
            --card-bg: #ffffff;
            --card-shadow: 0 25px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05);
            --text-primary: #1e1e2f;
            --text-secondary: #5b5b78;
            --text-muted: #8b8ba7;
            --input-bg: #f5f5fa;
            --input-border: #dcdce8;
            --input-focus-border: #6c63ff;
            --input-focus-shadow: 0 0 0 4px rgba(108, 99, 255, 0.12);
            --btn-gradient-start: #6c63ff;
            --btn-gradient-end: #4a42e0;
            --btn-hover-start: #7b73ff;
            --btn-hover-end: #5a52f0;
            --btn-shadow: 0 8px 25px rgba(108, 99, 255, 0.35);
            --btn-hover-shadow: 0 14px 35px rgba(108, 99, 255, 0.5);
            --success-bg: #e8f5e9;
            --success-text: #2e7d32;
            --error-bg: #ffebee;
            --error-text: #c62828;
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-mid) 35%, var(--bg-end) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-attachment: fixed;
            position: relative;
            overflow-x: hidden;
        }

        /* Partículas decorativas de fundo */
        body::before {
            content: '';
            position: fixed;
            top: -150px;
            left: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(108, 99, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: floatOrb1 12s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -120px;
            right: -120px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 107, 157, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: floatOrb2 15s ease-in-out infinite;
        }

        @keyframes floatOrb1 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(40px, -30px) scale(1.15);
            }
            50% {
                transform: translate(-20px, 20px) scale(0.9);
            }
            75% {
                transform: translate(30px, 40px) scale(1.1);
            }
        }

        @keyframes floatOrb2 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(-50px, -20px) scale(1.2);
            }
            66% {
                transform: translate(25px, 35px) scale(0.85);
            }
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            animation: fadeInUp 0.7s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 40px 36px 36px;
            box-shadow: var(--card-shadow);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #6c63ff, #ff6b9d, #ffa94d, #6c63ff);
            background-size: 300% 100%;
            animation: gradientBar 6s ease infinite;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        @keyframes gradientBar {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e8e5ff 0%, #f0e8ff 100%);
            margin-bottom: 16px;
            position: relative;
            box-shadow: 0 8px 24px rgba(108, 99, 255, 0.2);
            overflow: hidden;
        }

        .icon-wrapper img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .icon-wrapper:hover img {
            transform: rotate(-8deg) scale(1.1);
        }

        .title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 7px;
            letter-spacing: 0.01em;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.04em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 16px;
            pointer-events: none;
            z-index: 2;
            display: flex;
            align-items: center;
        }

        .input-wrapper .input-icon svg {
            width: 18px;
            height: 18px;
            color: #a0a0b8;
            transition: color var(--transition);
        }

        .input-field {
            width: 100%;
            padding: 14px 16px 14px 46px;
            font-size: 0.95rem;
            font-family: inherit;
            border: 2px solid var(--input-border);
            border-radius: var(--radius-sm);
            background: var(--input-bg);
            color: var(--text-primary);
            transition: all var(--transition);
            outline: none;
            letter-spacing: 0.01em;
        }

        .input-field::placeholder {
            color: #b0b0c8;
            font-weight: 400;
        }

        .input-field:focus {
            border-color: var(--input-focus-border);
            box-shadow: var(--input-focus-shadow);
            background: #fff;
        }

        .input-field:focus~.input-icon svg,
        .input-wrapper:focus-within .input-icon svg {
            color: #6c63ff;
        }

        .input-field.no-icon {
            padding-left: 16px;
        }

        .suggested-name {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 6px;
            min-height: 18px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .suggested-name .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #6c63ff;
            display: inline-block;
            animation: pulseDot 2s ease-in-out infinite;
        }

        @keyframes pulseDot {
            0%,
            100% {
                opacity: 0.4;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.6);
            }
        }

        .btn-generate {
            width: 100%;
            padding: 15px 24px;
            font-size: 1rem;
            font-weight: 650;
            font-family: inherit;
            letter-spacing: 0.02em;
            color: #ffffff;
            background: linear-gradient(135deg, var(--btn-gradient-start) 0%, var(--btn-gradient-end) 100%);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            box-shadow: var(--btn-shadow);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .btn-generate:hover {
            background: linear-gradient(135deg, var(--btn-hover-start) 0%, var(--btn-hover-end) 100%);
            box-shadow: var(--btn-hover-shadow);
            transform: translateY(-2px);
        }

        .btn-generate:active {
            transform: translateY(0) scale(0.98);
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3);
            transition: all 0.1s ease;
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(20%);
        }

        .btn-generate .btn-icon svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .btn-generate:hover .btn-icon svg {
            transform: translateY(-2px);
        }

        .btn-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-generate.loading .btn-icon {
            display: none;
        }
        .btn-generate.loading .btn-text {
            opacity: 0.7;
        }
        .btn-generate.loading .btn-spinner {
            display: inline-block;
            position: absolute;
            right: 24px;
        }

        .feedback-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: #1e1e2f;
            color: #fff;
            padding: 14px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.02em;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        .feedback-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .feedback-toast.success {
            background: #1b5e20;
            box-shadow: 0 15px 40px rgba(27, 94, 32, 0.5);
        }

        .feedback-toast.error {
            background: #b71c1c;
            box-shadow: 0 15px 40px rgba(183, 28, 28, 0.5);
        }

        .feedback-toast .toast-icon {
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        @media (max-width: 600px) {
            .card {
                padding: 28px 20px 24px;
                border-radius: var(--radius-md);
            }
            .card::before {
                border-radius: var(--radius-md) var(--radius-md) 0 0;
            }
            .title {
                font-size: 1.35rem;
            }
            .subtitle {
                font-size: 0.8rem;
            }
            .icon-wrapper {
                width: 50px;
                height: 50px;
                margin-bottom: 12px;
            }
            .icon-wrapper img {
                width: 28px;
                height: 28px;
            }
            .input-field {
                padding: 12px 14px 12px 40px;
                font-size: 0.9rem;
            }
            .input-field.no-icon {
                padding-left: 14px;
            }
            .btn-generate {
                padding: 13px 20px;
                font-size: 0.95rem;
            }
            .feedback-toast {
                bottom: 20px;
                padding: 12px 20px;
                font-size: 0.8rem;
                border-radius: 40px;
            }
        }

        @media (max-width: 380px) {
            .card {
                padding: 22px 14px 20px;
            }
            .title {
                font-size: 1.2rem;
            }
            .input-field {
                padding: 10px 12px 10px 36px;
                font-size: 0.85rem;
            }
            .input-field.no-icon {
                padding-left: 12px;
            }
            .btn-generate {
                padding: 11px 16px;
                font-size: 0.88rem;
                gap: 6px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="card">
            <div class="header">
                <div class="icon-wrapper">
                    <!-- Ícone personalizado (mesma imagem do favicon) -->
                    <img src="https://cdn.discordapp.com/attachments/1187603598759166036/1520900063600050428/geradorurl.png?ex=6a42e010&is=6a418e90&hm=854caa255ae48a0ca6380e33fea5256173d05a2189510e40d7d929dc45c1c3be" alt="Ícone Gerador URL">
                </div>
                <h1 class="title">Gerador de Atalhos .URL</h1>
                <p class="subtitle">Crie atalhos da Internet para o Windows</p>
            </div>

            <form id="urlForm" autocomplete="off" novalidate>
                <div class="form-group">
                    <label for="urlInput">URL do atalho *</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="2" y1="12" x2="22" y2="12"/>
                                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                            </svg>
                        </span>
                        <input
                        type="text"
                        id="urlInput"
                        class="input-field"
                        placeholder="https://exemplo.com ou exemplo.com"
                        required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="fileNameInput">Nome do arquivo <span style="font-weight:400;text-transform:none;letter-spacing:0;">(opcional)</span></label>
                    <input
                    type="text"
                    id="fileNameInput"
                    class="input-field no-icon"
                    placeholder="Será gerado automaticamente..."
                    >
                    <div class="suggested-name" id="suggestedName" style="visibility: hidden;">
                        <span class="dot"></span>
                        <span id="suggestedNameText"></span>
                    </div>
                </div>

                <button type="submit" class="btn-generate" id="generateBtn">
                    <span class="btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                    </span>
                    <span class="btn-text">Gerar e Baixar</span>
                    <span class="btn-spinner"></span>
                </button>
            </form>
        </div>
    </div>

    <div class="feedback-toast" id="feedbackToast">
        <span class="toast-icon" id="toastIcon"></span>
        <span id="toastMessage"></span>
    </div>

    <script>
        (function() {
            const urlForm = document.getElementById('urlForm');
            const urlInput = document.getElementById('urlInput');
            const fileNameInput = document.getElementById('fileNameInput');
            const generateBtn = document.getElementById('generateBtn');
            const suggestedNameEl = document.getElementById('suggestedName');
            const suggestedNameText = document.getElementById('suggestedNameText');
            const feedbackToast = document.getElementById('feedbackToast');
            const toastIcon = document.getElementById('toastIcon');
            const toastMessage = document.getElementById('toastMessage');

            let toastTimeout = null;

            function ensureProtocol(rawUrl) {
                const trimmed = rawUrl.trim();
                if (!trimmed) return trimmed;
                if (/^https?:\/\//i.test(trimmed)) {
                    return trimmed;
                }
                if (/^\/\//.test(trimmed)) {
                    return 'https:' + trimmed;
                }
                return 'https://' + trimmed;
            }

            function extractHostname(urlString) {
                try {
                    const url = new URL(urlString);
                    return url.hostname;
                } catch {
                    const cleaned = urlString.replace(/^https?:\/\//i, '').split('/')[0].split('?')[0].split('#')[0];
                    return cleaned || null;
                }
            }

            function sanitizeFileName(name) {
                if (!name || !name.trim()) return '';
                let sanitized = name.trim().replace(/[\\\/:*?"<>|]/g, '_');
                sanitized = sanitized.replace(/_+/g, '_');
                sanitized = sanitized.replace(/^_+|_+$/g, '');
                if (sanitized.length > 200) {
                    sanitized = sanitized.substring(0, 200);
                }
                return sanitized;
            }

            function showToast(message, type = 'success') {
                if (toastTimeout) {
                    clearTimeout(toastTimeout);
                }
                feedbackToast.classList.remove('show', 'success', 'error');
                toastIcon.textContent = type === 'success' ? '✅' : '❌';
                toastMessage.textContent = message;
                feedbackToast.classList.add(type);
                void feedbackToast.offsetWidth;
                feedbackToast.classList.add('show');
                toastTimeout = setTimeout(() => {
                    feedbackToast.classList.remove('show');
                    toastTimeout = null;
                }, 3500);
            }

            function generateUrlFileContent(url) {
                return '[InternetShortcut]\r\nURL=' + url + '\r\n';
            }

            function triggerDownload(content, fileName) {
                const fullFileName = fileName + '.url';
                const blob = new Blob([content], {
                    type: 'application/internet-shortcut;charset=utf-8'
                });
                const blobUrl = URL.createObjectURL(blob);
                const downloadLink = document.createElement('a');
                downloadLink.href = blobUrl;
                downloadLink.download = fullFileName;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                setTimeout(() => {
                    URL.revokeObjectURL(blobUrl);
                }, 200);
            }

            function updateFileNameSuggestion() {
                const rawUrl = urlInput.value.trim();
                if (!rawUrl) {
                    suggestedNameEl.style.visibility = 'hidden';
                    return;
                }
                const urlWithProtocol = ensureProtocol(rawUrl);
                const hostname = extractHostname(urlWithProtocol);
                if (hostname && hostname.length > 0) {
                    suggestedNameText.textContent = 'Sugestão: ' + hostname + '.url';
                    suggestedNameEl.style.visibility = 'visible';
                } else {
                    suggestedNameEl.style.visibility = 'hidden';
                }
            }

            function validateUrl(rawUrl) {
                const trimmed = rawUrl.trim();
                if (!trimmed) {
                    return { valid: false, url: null, error: 'Por favor, digite uma URL.' };
                }
                const urlWithProtocol = ensureProtocol(trimmed);
                try {
                    const parsed = new URL(urlWithProtocol);
                    if (!parsed.hostname.includes('.') && parsed.hostname !== 'localhost') {
                        if (parsed.hostname.length === 0) {
                            return { valid: false, url: null, error: 'URL inválida. Verifique o endereço digitado.' };
                        }
                    }
                    return { valid: true, url: urlWithProtocol, error: null };
                } catch {
                    return { valid: false, url: null, error: 'URL inválida. Verifique o endereço digitado (ex: https://exemplo.com).' };
                }
            }

            function handleSubmit(event) {
                event.preventDefault();
                const validation = validateUrl(urlInput.value);
                if (!validation.valid) {
                    showToast(validation.error, 'error');
                    urlInput.focus();
                    urlInput.style.borderColor = '#e57373';
                    urlInput.style.backgroundColor = '#fff5f5';
                    setTimeout(() => {
                        urlInput.style.borderColor = '';
                        urlInput.style.backgroundColor = '';
                    }, 800);
                    return;
                }

                const finalUrl = validation.url;
                let fileName = fileNameInput.value.trim();
                if (!fileName) {
                    const hostname = extractHostname(finalUrl);
                    fileName = hostname || 'atalho';
                }
                fileName = sanitizeFileName(fileName);
                if (!fileName || fileName.length === 0) {
                    fileName = 'atalho';
                }

                generateBtn.classList.add('loading');
                generateBtn.disabled = true;

                setTimeout(() => {
                    try {
                        const fileContent = generateUrlFileContent(finalUrl);
                        triggerDownload(fileContent, fileName);
                        showToast('Arquivo "' + fileName + '.url" baixado com sucesso! 🎉', 'success');
                    } catch (err) {
                        console.error('Erro ao gerar arquivo:', err);
                        showToast('Ocorreu um erro ao gerar o arquivo. Tente novamente.', 'error');
                    } finally {
                        generateBtn.classList.remove('loading');
                        generateBtn.disabled = false;
                    }
                }, 350);
            }

            urlForm.addEventListener('submit', handleSubmit);
            urlInput.addEventListener('input', updateFileNameSuggestion);

            fileNameInput.addEventListener('focus', function() {
                const rawUrl = urlInput.value.trim();
                if (rawUrl && !fileNameInput.value.trim()) {
                    const urlWithProtocol = ensureProtocol(rawUrl);
                    const hostname = extractHostname(urlWithProtocol);
                    if (hostname) {
                        fileNameInput.placeholder = 'Ex: ' + hostname;
                    }
                }
            });

            fileNameInput.addEventListener('blur', function() {
                if (!fileNameInput.value.trim()) {
                    fileNameInput.placeholder = 'Será gerado automaticamente...';
                }
            });

            urlInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    urlForm.dispatchEvent(new Event('submit', { cancelable: true }));
                }
            });
            fileNameInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    urlForm.dispatchEvent(new Event('submit', { cancelable: true }));
                }
            });

            updateFileNameSuggestion();

            setTimeout(() => {
                urlInput.focus();
            }, 400);

            console.log('🔗 Gerador de Atalhos .URL pronto!');
            console.log('   Ícone personalizado aplicado.');
        })();
    </script>
</body>
</html>
